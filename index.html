<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --bg: #f3f4f6; --text: #1f2937; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); padding: 10px; }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        
        .header-section { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 15px; }
        
        .student-info { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 20px; 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #e5e7eb; 
        }

        @media (min-width: 600px) {
            .student-info { display: grid; grid-template-columns: 1fr 1fr; }
            body { padding: 20px; }
            .container { padding: 30px; }
        }

        .input-group label { display: block; font-weight: 600; font-size: 0.75rem; color: #64748b; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; background: white; }

        /* Textarea Styling for Subject Names */
        td textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 8px;
            font-size: 0.9rem;
            resize: none;
            overflow: hidden;
            min-height: 38px;
            line-height: 1.4;
            display: block;
            background: white;
        }

        .mode-selector { margin-bottom: 20px; text-align: center; padding: 12px; background: #eff6ff; border-radius: 8px; display: flex; justify-content: center; gap: 15px; }
        .mode-selector label { font-weight: 600; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .semester-box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        
        th { text-align: left; padding: 10px; background: #f1f5f9; border-bottom: 2px solid #e2e8f0; font-size: 0.75rem; }
        td { padding: 8px 5px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; padding: 12px 18px; transition: 0.15s; font-size: 0.9rem; -webkit-tap-highlight-color: transparent; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 5px; }
        .btn-remove { background: #fee2e2; color: #ef4444; padding: 6px 10px; font-size: 0.75rem; border-radius: 4px; border: none; cursor: pointer; }
        .btn-print { background: #1e293b; color: white; width: 100%; margin-top: 20px; font-size: 1.1rem; }

        .summary-card { background: #f8fafc; border: 2px solid var(--primary); padding: 20px; border-radius: 10px; text-align: center; margin-top: 15px; }
        .summary-card h2 { font-size: 2.2rem; color: var(--primary); }

        /* PRINT CONFIGURATION */
        @media print {
            @page { size: A4; margin: 15mm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            .btn, .mode-selector, .btn-remove, .btn-add, #addSemBtn, .delete-subject-btn { display: none !important; }
            
            input, select, td textarea { 
                border: none !important; 
                background: transparent !important; 
                appearance: none !important; 
                -webkit-appearance: none !important; 
                font-weight: 600; 
                padding: 0 !important; 
                color: black; 
                height: auto !important;
            }
            .semester-box { page-break-inside: avoid; border: 1px solid #eee; margin-bottom: 20px; }
            table { min-width: 100%; }
            td { padding: 10px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <input type="text" class="sem-name-input" value="GPA Projection Dashboard" style="text-align: center; font-size: 1.4rem; color: var(--primary); font-weight: bold; width: 100%;">
        <p style="font-size: 0.85rem; margin-top: 5px; text-align: center;">Academic Performance Grade Report</p>
    </div>

    <div class="student-info">
        <div class="input-group">
            <label>STUDENT NAME</label>
            <input type="text" placeholder="Enter Full Name" id="studentName">
        </div>
        <div class="input-group">
            <label>STUDENT ID / ROLL NO.</label>
            <input type="text" placeholder="e.g. 1UIT-01">
        </div>
    </div>

    <div class="mode-selector">
        <label><input type="radio" name="calcMode" value="gpa" checked onchange="toggleMode()"> GPA</label>
        <label><input type="radio" name="calcMode" value="cgpa" onchange="toggleMode()"> CGPA</label>
    </div>

    <div id="semester-container"></div>

    <button class="btn btn-add" id="addSemBtn" onclick="addSemester()" style="display:none;">+ Add Semester</button>
    
    <div class="summary-card">
        <p id="resultLabel" style="font-weight: 700; color: #64748b; text-transform: uppercase; font-size: 0.8rem;">Semester GPA</p>
        <h2 id="finalScore">0.00</h2>
        <p id="totalCreditsText" style="font-size: 0.85rem; font-weight: 600;">Total Credits Earned: 0</p>
    </div>

    <button class="btn btn-print" id="downloadBtn">Download Report</button>
</div>

<script>
    const gradeScale = {
        "A+": 4.0, "A": 4.0, "A-": 3.67, "B+": 3.33, "B": 3.0,
        "B-": 2.67, "C+": 2.33, "C": 2.0, "D": 1.0, "F": 0.0
    };

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const originalTitle = document.title;
        const studentName = document.getElementById('studentName').value.trim() || "Student";
        document.title = studentName.replace(/\s+/g, '_') + "_Grade_Report";
        window.print();
        setTimeout(() => { document.title = originalTitle; }, 1000);
    });

    function toggleMode() {
        const mode = document.querySelector('input[name="calcMode"]:checked').value;
        const addBtn = document.getElementById('addSemBtn');
        const container = document.getElementById('semester-container');
        container.innerHTML = '';
        if (mode === 'gpa') {
            addBtn.style.display = 'none';
            addSemester("Current Semester");
            document.getElementById('resultLabel').innerText = "Semester GPA";
        } else {
            addBtn.style.display = 'block';
            addSemester("Semester 1");
            document.getElementById('resultLabel').innerText = "Cumulative CGPA";
        }
        calculateResults();
    }

    function addSemester(title = null) {
        const container = document.getElementById('semester-container');
        const semCount = container.children.length + 1;
        const semId = `sem-${Date.now()}`;
        const defaultTitle = title || `Semester ${semCount}`;
        
        const div = document.createElement('div');
        div.className = 'semester-block semester-box';
        div.id = semId;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <input type="text" value="${defaultTitle}" style="font-weight:700; color:var(--primary); border:none; padding:2px; font-size:1rem; width:70%;">
                ${semCount > 1 ? `<button class="btn-remove" onclick="removeSem('${semId}')">Remove Semester</button>` : ''}
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:60%">Subject</th>
                            <th style="width:15%">Credit</th>
                            <th style="width:25%">Grade</th>
                        </tr>
                    </thead>
                    <tbody class="course-list"></tbody>
                </table>
            </div>
            <button class="btn btn-add" style="padding: 8px; font-size:0.8rem; background:#f1f5f9; color:var(--text);" onclick="addCourse('${semId}')">+ Add Subject</button>
        `;
        container.appendChild(div);
        for(let i=0; i<4; i++) addCourse(semId);
    }

    function addCourse(semId) {
        const tbody = document.querySelector(`#${semId} .course-list`);
        const tr = document.createElement('tr');
        tr.className = 'course-row';
        tr.innerHTML = `
            <td>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button class="btn-remove delete-subject-btn" onclick="this.closest('tr').remove(); calculateResults();" 
                            style="padding: 4px 8px; font-size: 0.7rem; min-width: 28px;">×</button>
                    <textarea placeholder="Subject Name" rows="1" style="flex: 1;"
                              oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                </div>
            </td>
            <td><input type="number" class="credit" value="3" min="0" oninput="calculateResults()"></td>
            <td>
                <select class="grade" onchange="calculateResults()">
                    <option value="A+">A+</option><option value="A">A</option>
                    <option value="A-">A-</option><option value="B+">B+</option>
                    <option value="B">B</option><option value="B-">B-</option>
                    <option value="C+">C+</option><option value="C">C</option>
                    <option value="D">D</option><option value="F">F</option>
                </select>
            </td>
        `;
        tbody.appendChild(tr);
        calculateResults();
    }

    function removeSem(id) {
        document.getElementById(id).remove();
        calculateResults();
    }

    function calculateResults() {
        let totalPointsEarned = 0;
        let totalCreditsEarned = 0;
        document.querySelectorAll('.course-row').forEach(row => {
            const credit = parseFloat(row.querySelector('.credit').value) || 0;
            const gradeLetter = row.querySelector('.grade').value;
            const point = gradeScale[gradeLetter];
            totalPointsEarned += (point * credit);
            totalCreditsEarned += credit;
        });
        const finalScore = totalCreditsEarned > 0 ? (totalPointsEarned / totalCreditsEarned) : 0;
        document.getElementById('finalScore').innerText = finalScore.toFixed(2);
        document.getElementById('totalCreditsText').innerText = `Total Credits Earned: ${totalCreditsEarned}`;
    }

    toggleMode();
</script>

</body>
</html>
